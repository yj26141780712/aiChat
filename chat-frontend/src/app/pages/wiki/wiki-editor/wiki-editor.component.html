<app-navbar />

<div class="editor-layout">
  <!-- 顶部工具栏 -->
  <div class="editor-toolbar">
    <button class="back-btn" (click)="goBack()">← 返回</button>
    <input class="title-input" [ngModel]="title()" (ngModelChange)="title.set($event); onContentChange()"
      placeholder="文档标题" />
    <div class="save-area">
      @if (saveStatus() === 'saved') {
      <span class="save-indicator saved">✓ 已保存</span>
      } @else if (saveStatus() === 'saving') {
      <span class="save-indicator saving">保存中...</span>
      } @else if (saveStatus() === 'unsaved') {
      <span class="save-indicator unsaved">● 未保存</span>
      }
      <button class="save-btn" (click)="save()" [disabled]="isSaving()">保存</button>
    </div>
  </div>

  @if (isLoading()) {
  <div class="loading">加载中...</div>
  } @else {
  <!-- Markdown 格式化工具栏 -->
  <div class="format-toolbar">
    <div class="format-group">
      <button class="fmt-btn" (click)="heading(1)" title="标题1">H1</button>
      <button class="fmt-btn" (click)="heading(2)" title="标题2">H2</button>
      <button class="fmt-btn" (click)="heading(3)" title="标题3">H3</button>
    </div>
    <div class="format-divider"></div>
    <div class="format-group">
      <button class="fmt-btn" (click)="bold()" title="粗体 (Ctrl+B)"><b>B</b></button>
      <button class="fmt-btn" (click)="italic()" title="斜体 (Ctrl+I)"><i>I</i></button>
      <button class="fmt-btn" (click)="strikethrough()" title="删除线"><s>S</s></button>
    </div>
    <div class="format-divider"></div>
    <div class="format-group">
      <button class="fmt-btn" (click)="quote()" title="引用">❝</button>
      <button class="fmt-btn" (click)="unorderedList()" title="无序列表">•≡</button>
      <button class="fmt-btn" (click)="orderedList()" title="有序列表">1.</button>
      <button class="fmt-btn" (click)="taskList()" title="任务列表">☑</button>
    </div>
    <div class="format-divider"></div>
    <div class="format-group">
      <button class="fmt-btn" (click)="code()" title="行内代码">&lt;/&gt;</button>
      <button class="fmt-btn" (click)="codeBlock()" title="代码块">{{ '{' }} {{ '}' }}</button>
    </div>
    <div class="format-divider"></div>
    <div class="format-group">
      <button class="fmt-btn" (click)="link()" title="链接">🔗</button>
      <button class="fmt-btn" (click)="image()" title="图片">🖼</button>
      <button class="fmt-btn" (click)="table()" title="表格">⊞</button>
      <button class="fmt-btn" (click)="horizontalRule()" title="分割线">―</button>
    </div>
  </div>

  <!-- 编辑区：左编辑 + 右预览 -->
  <div class="editor-split">
    <div class="editor-pane">
      <textarea #editorTextarea class="editor-textarea" [ngModel]="content()"
        (ngModelChange)="content.set($event); onContentChange()" (keydown.tab)="onTab($event)"
        placeholder="在此输入 Markdown 内容...&#10;&#10;快捷键：Ctrl+B 粗体 | Ctrl+I 斜体 | Ctrl+S 保存">
      </textarea>
    </div>
    <div class="preview-pane">
      <div class="markdown-body" [innerHTML]="previewHtml"></div>
    </div>
  </div>

  <!-- 底部状态栏 -->
  <div class="status-bar">
    <span>字符: {{ charCount() }}</span>
    <span>Ctrl+B 粗体 | Ctrl+I 斜体 | Ctrl+S 保存</span>
  </div>
  }
</div>
