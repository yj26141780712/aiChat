<div class="auth-container">
  <div class="auth-card">
    <h2>重置密码</h2>

    @if (error()) {
      <div class="error-message">{{ error() }}</div>
    }
    @if (success()) {
      <div class="success-message">{{ success() }}</div>
      <div class="auth-links">
        <a routerLink="/login">前往登录</a>
      </div>
    } @else {
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>新密码</label>
          <input type="password" [ngModel]="newPassword()" (ngModelChange)="newPassword.set($event)" name="newPassword" placeholder="至少 6 位" required />
        </div>

        <div class="form-group">
          <label>确认新密码</label>
          <input type="password" [ngModel]="confirmPassword()" (ngModelChange)="confirmPassword.set($event)" name="confirmPassword" placeholder="再次输入新密码" required />
        </div>

        <button type="submit" [disabled]="isLoading()" class="submit-btn">
          {{ isLoading() ? '重置中...' : '重置密码' }}
        </button>
      </form>
    }
  </div>
</div>
