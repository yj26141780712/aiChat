<nav class="navbar">
  <div class="navbar-brand">
    <a routerLink="/chat">AI 聊天助手</a>
  </div>

  <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()">
    <span></span><span></span><span></span>
  </button>

  <div class="navbar-links" [class.open]="menuOpen()">
    @if (currentUser$ | async; as user) {
      <a routerLink="/wiki" (click)="menuOpen.set(false)">Wiki</a>
      <a routerLink="/knowledge" (click)="menuOpen.set(false)">知识库</a>
      @if (isAdmin(user)) {
        <a routerLink="/admin/users" (click)="menuOpen.set(false)">用户管理</a>
        <a routerLink="/admin/invitation-codes" (click)="menuOpen.set(false)">邀请码</a>
      }
      <span class="user-info">{{ user.username }}</span>
      <button (click)="logout()" class="logout-btn">退出</button>
    }
  </div>
</nav>
